<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Gallery</title>
    <style>
        body {
            background-color: #f0f0f0; /* Light grey background for the page */
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            margin: 20px;
        }

        .game-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 31%;
            margin: 1%;
            text-decoration: none;
            color: black;
            background-color: #f7f7f7; /* Slightly darker white background */
            border-radius: 8px; /* Rounded corners for the container */
            overflow: hidden; /* Ensures that the image does not break the border radius */
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); /* Subtle shadow for depth */
        }

        .game-link img {
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 9;
            object-fit: cover; /* Ensures the image covers the area, cropping instead of stretching */
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
        }

        .game-link p {
            font-size: 16px; /* Set the font size for game titles */
            color: #333;
            padding: 8px;
            margin: 0;
            width: 100%; /* Ensures text alignment and padding does not overflow */
            text-align: center; /* Centers the text */
        }

        .game-link:hover {
            outline: 2px solid purple; /* Purple outline on hover */
            cursor: pointer; /* Change cursor to pointer to indicate it's clickable */
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="https://example.com/link1" class="game-link">
            <img src="path_to_image1.jpg" alt="Game 1">
            <p>Game Title 1</p>
        </a>
        <a href="https://example.com/link2" class="game-link">
            <img src="path_to_image2.jpg" alt="Game 2">
            <p>Game Title 2</p>
        </a>
        <a href="https://example.com/link3" class="game-link">
            <img src="path_to_image3.jpg" alt="Game 3">
            <p>Game Title 3</p>
        </a>
        <a href="https://example.com/link4" class="game-link">
            <img src="path_to_image4.jpg" alt="Game 4">
            <p>Game Title 4</p>
        </a>
        <a href="https://example.com/link5" class="game-link">
            <img src="path_to_image5.jpg" alt="Game 5">
            <p>Game Title 5</p>
        </a>
        <a href="https://example.com/link6" class="game-link">
            <img src="path_to_image6.jpg" alt="Game 6">
            <p>Game Title 6</p>
        </a>
    </div>
</body>
</html>
