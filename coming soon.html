<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mas0ng.com | Coming Soon</title>
<style>
  body, h1, a {
    font-weight: bold; /* Makes all text bold */
  }

  body {
    font-family: 'Arial', sans-serif;
    margin: 0;
    padding: 0;
    background: #f5f5f5;
  }

  .navbar {
    display: flex;
    justify-content: center;
    background: #fff;
    padding: 10px 0;
  }
  
  .navbar ul {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    gap: 20px;
  }

  .navbar ul li a {
    text-decoration: none;
    color: #333;
  }

  .content {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  
  .branding h1 {
    font-size: 3em;
    margin: 20px 0;
    background: #fff;
  }
  
  .branding h1 span {
    background: -webkit-linear-gradient(left, #654ea3, #eaafc8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  
  .home-btn {
    display: inline-block;
    padding: 10px 20px;
    margin-top: 20px;
    border: 2px solid #654ea3;
    border-radius: 5px;
    background: transparent;
    color: #654ea3;
    text-decoration: none;
    transition: all 0.3s ease;
  }
  
  .home-btn:hover {
    background: #654ea3;
    color: #fff;
  }

  /* Responsive styles */
  @media (max-width: 768px) {
    .navbar ul {
      flex-direction: column;
      width: 100%;
      gap: 0;
    }

    .navbar {
      position: fixed;
      width: 200px;
      height: 100%;
      left: 0;
      top: 0;
      flex-direction: column;
      align-items: flex-start;
      padding: 20px;
      box-shadow: 3px 0 6px rgba(0, 0, 0, 0.1);
      transform: translateX(-100%);
      transition: transform 0.3s ease-in-out;
    }

    .navbar ul li {
      width: 100%;
    }

    .navbar ul li a {
      display: block;
      padding: 10px;
      border-bottom: 1px solid #ddd;
      width: 100%;
    }

    .navbar.active {
      transform: translateX(0);
    }

    .content {
      padding-left: 200px;
    }
  }
</style>
</head>
<body>
<div class="navbar" id="navbar">
  <ul>
    <li><a href="#">Servers</a></li>
    <li><a href="#">Users</a></li>
    <li><a href="#">Emojis</a></li>
    <li><a href="#">Bans</a></li>
    <li><a href="#">Buy credits</a></li>
  </ul>
</div>
<div class="content">
  <div class="branding">
    <h1><span>Coming Soon</span></h1>
    <a href="index.html" class="home-btn">Return to Home</a> <!-- Link to your homepage -->
  </div>
</div>
<script>
  // JavaScript to toggle the sidebar
  document.addEventListener('DOMContentLoaded', function () {
    const navbar = document.getElementById('navbar');
    window.addEventListener('resize', function () {
      if (window.innerWidth > 768) {
        navbar.classList.remove('active');
      }
    });

    window.addEventListener('click', function (e) {
      if (e.target != navbar && e.target != document.querySelector('.navbar ul')) {
        navbar.classList.remove('active');
      }
    });

    document.querySelector('.navbar ul').addEventListener('click', function () {
      navbar.classList.toggle('active');
    });
  });
</script>
</body>
</html>
