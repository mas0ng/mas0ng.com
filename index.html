<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mas0ng.com | Home</title>
<link rel="icon" type="image/x-icon" href="mas0ng.com/images/favicon.png">
<style>
  /* Basic Resets */
  body, h1, a {
    margin: 0;
    padding: 0;
    font-weight: bold;
  }

  /* Font and Background */
  body {
    font-family: 'Arial', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: #fff;
  }
  
  /* Navbar Styles */
  .navbar {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    padding: 10px 0;
    background: rgba(255, 255, 255, 0.9);
    z-index: 1000; /* Ensure navbar is above other content */
  }
  
  .navbar ul {
    list-style: none;
    display: flex;
    gap: 10px; /* Reduced gap for mobile */
    padding: 0;
    margin: 0;
  }
  
  .navbar ul li {
    padding: 5px 10px;
  }
  
  .navbar ul li a {
    text-decoration: none;
    color: #333;
  }

  /* Branding and Button Styles */
  .branding h1 {
    font-size: 2em; /* Smaller font size for mobile */
  }
  
  .branding h1 span {
    background: -webkit-linear-gradient(left, #654ea3, #eaafc8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  
  .explore-btn {
    display: inline-block;
    padding: 10px 20px;
    margin-top: 20px;
    border: 2px solid #654ea3;
    border-radius: 5px;
    background: transparent;
    color: #654ea3;
    text-decoration: none;
    transition: all 0.3s ease;
  }
  
  .explore-btn:hover, .explore-btn:focus {
    background: #654ea3;
    color: #fff;
    outline: none; /* Remove focus outline */
  }
  
  .explore-btn:after {
    content: '→';
    display: inline-block;
    margin-left: 10px;
    transition: margin-left 0.3s ease;
  }
  
  .explore-btn:hover:after, .explore-btn:focus:after {
    margin-left: 15px;
  }

  /* Media Queries for smaller devices */
  @media (max-width: 768px) {
    .navbar ul {
      flex-direction: column;
      align-items: center;
    }

    .navbar ul li {
      padding: 10px;
    }

    .branding h1 {
      text-align: center;
    }

    .explore-btn {
      font-size: 0.8em;
      padding: 8px 16px;
    }
  }
</style>
</head>
<body>
<div class="navbar">
  <ul>
    <li><a href="coming soon.html">Coming Soon</a></li>
    <li><a href="coming soon.html">Coming Soon</a></li>
    <li><a href="coming soon.html">Coming Soon</a></li>
    <li><a href="coming soon.html">Coming Soon</a></li>
    <li><a href="coming soon.html">Coming Soon</a></li>
  </ul>
</div>
<div class="branding">
  <h1>Welcome to <span>mas0ng.com</span></h1>
  <a href="coming soon.html" class="explore-btn">Explore</a>
</div>
</body>
</html>
